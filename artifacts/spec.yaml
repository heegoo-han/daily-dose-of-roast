version: 1

scenarios:
  - id: "KANBAN-001"
    name: "카드 생성"
    given: "To Do 칼럼이 비어 있다"
    when: "사용자가 추가 버튼을 클릭하고 제목 '회의록 작성'을 입력한다"
    then: "To Do 칼럼에 '회의록 작성' 카드가 표시된다"
    examples:
      - input: { title: "회의록 작성" }
        expect: { cardText: "회의록 작성", column: "To Do", priority: "중" }
      - input: { title: "" }
        expect: { errorMessage: "제목을 입력해주세요" }

  - id: "KANBAN-002"
    name: "카드 인라인 편집"
    given: "'회의록 작성' 카드가 To Do 칼럼에 있다"
    when: "사용자가 카드를 클릭하고 제목을 '주간 회의록'으로 변경한다"
    then: "카드에 '주간 회의록'이 표시된다"
    examples:
      - input: { field: "title", value: "주간 회의록" }
        expect: { cardText: "주간 회의록" }
      - input: { field: "priority", value: "상" }
        expect: { priority: "상" }
      - input: { field: "title", value: "" }
        expect: { errorMessage: "제목을 입력해주세요" }

  - id: "KANBAN-003"
    name: "카드 삭제"
    given: "'회의록 작성' 카드가 To Do 칼럼에 있다"
    when: "사용자가 삭제 버튼을 클릭한다"
    then: "확인 대화상자가 표시되고 확인 시 카드가 삭제된다"
    examples:
      - input: { confirm: true }
        expect: { cardVisible: false, dialogText: "정말 삭제하시겠습니까?" }
      - input: { confirm: false }
        expect: { cardVisible: true }

  - id: "KANBAN-004"
    name: "칼럼 간 드래그&드롭"
    given: "'회의록 작성' 카드가 To Do 칼럼에 있다"
    when: "사용자가 카드를 In Progress 칼럼으로 드래그한다"
    then: "카드가 In Progress 칼럼에 표시된다"
    examples:
      - input: { cardTitle: "회의록 작성", targetColumn: "In Progress" }
        expect: { column: "In Progress", cardText: "회의록 작성" }

  - id: "KANBAN-005"
    name: "칼럼 내 카드 순서 변경"
    given: "To Do 칼럼에 '카드A', '카드B' 순서로 카드가 있다"
    when: "사용자가 '카드B'를 '카드A' 위로 드래그한다"
    then: "To Do 칼럼에 '카드B', '카드A' 순서로 표시된다"
    examples:
      - input: { dragCard: "카드B", targetPosition: 0 }
        expect: { columnOrder: ["카드B", "카드A"] }

  - id: "KANBAN-006"
    name: "태그 생성 및 자동완성"
    given: "카드 편집 화면이 열려 있다"
    when: "사용자가 태그 입력란에 '버그'를 입력한다"
    then: "카드에 '버그' 태그가 추가된다"
    examples:
      - input: { tag: "버그" }
        expect: { tagVisible: true, tagText: "버그" }
      - input: { tagInput: "버", existingTags: ["버그", "기능"] }
        expect: { suggestions: ["버그"] }

  - id: "KANBAN-007"
    name: "제목 검색"
    given: "'회의록 작성', '장보기', '운동하기' 카드가 있다"
    when: "사용자가 검색창에 '회의'를 입력한다"
    then: "'회의록 작성' 카드만 표시된다"
    examples:
      - input: { searchText: "회의" }
        expect: { visibleCards: ["회의록 작성"], hiddenCardCount: 2 }
      - input: { searchText: "" }
        expect: { visibleCardCount: 3 }

  - id: "KANBAN-008"
    name: "우선순위 필터"
    given: "우선순위 '상' 카드 1개, '중' 카드 2개가 있다"
    when: "사용자가 우선순위 '상' 필터를 선택한다"
    then: "우선순위 '상'인 카드만 표시된다"
    examples:
      - input: { priorityFilter: "상" }
        expect: { visibleCardCount: 1 }
      - input: { priorityFilter: null }
        expect: { visibleCardCount: 3 }

  - id: "KANBAN-009"
    name: "태그 필터"
    given: "'버그' 태그가 있는 카드 1개, 없는 카드 2개가 있다"
    when: "사용자가 태그 '버그' 필터를 선택한다"
    then: "'버그' 태그가 있는 카드만 표시된다"
    examples:
      - input: { tagFilter: "버그" }
        expect: { visibleCardCount: 1 }

  - id: "KANBAN-010"
    name: "복합 필터 (우선순위 + 태그)"
    given: "우선순위 '상' + 태그 '버그' 카드 1개, 우선순위 '상' + 태그 '기능' 카드 1개가 있다"
    when: "사용자가 우선순위 '상'과 태그 '버그'를 동시에 필터한다"
    then: "두 조건을 모두 만족하는 카드만 표시된다"
    examples:
      - input: { priorityFilter: "상", tagFilter: "버그" }
        expect: { visibleCardCount: 1 }

  - id: "KANBAN-011"
    name: "다크모드 토글"
    given: "앱이 라이트모드로 표시되어 있다"
    when: "사용자가 다크모드 토글을 클릭한다"
    then: "앱이 다크모드로 전환된다"
    examples:
      - input: { currentTheme: "light" }
        expect: { theme: "dark" }
      - input: { currentTheme: "dark" }
        expect: { theme: "light" }

  - id: "KANBAN-012"
    name: "다크모드 설정 영속화"
    given: "사용자가 다크모드를 활성화했다"
    when: "페이지를 새로고침한다"
    then: "다크모드가 유지된다"
    examples:
      - input: { savedTheme: "dark" }
        expect: { theme: "dark" }

  - id: "KANBAN-013"
    name: "데이터 자동 저장 및 복원"
    given: "사용자가 '회의록 작성' 카드를 In Progress로 이동했다"
    when: "페이지를 새로고침한다"
    then: "In Progress 칼럼에 '회의록 작성' 카드가 표시된다"
    examples:
      - input: { cardTitle: "회의록 작성", column: "In Progress" }
        expect: { column: "In Progress", cardText: "회의록 작성" }

  - id: "KANBAN-014"
    name: "JSON 내보내기"
    given: "보드에 To Do 칼럼의 '회의록 작성' 카드가 있다"
    when: "사용자가 내보내기 버튼을 클릭한다"
    then: "모든 칼럼과 카드 데이터가 포함된 JSON 파일이 다운로드된다"
    examples:
      - input: { action: "export" }
        expect: { toastMessage: "내보내기 완료" }

  - id: "KANBAN-015"
    name: "JSON 가져오기 (전체 교체)"
    given: "보드에 기존 카드가 있다"
    when: "사용자가 JSON 파일을 가져오기한다"
    then: "확인 후 기존 데이터가 교체된다"
    examples:
      - input: { file: "valid.json", confirm: true }
        expect: { dialogText: "기존 데이터가 모두 교체됩니다", boardReplaced: true }
      - input: { file: "valid.json", confirm: false }
        expect: { boardReplaced: false }
      - input: { file: "invalid.txt" }
        expect: { errorMessage: "올바른 형식의 파일이 아닙니다" }

  - id: "KANBAN-016"
    name: "카드 편집 모드 진입"
    given: "'회의록 작성' 카드가 To Do 칼럼에 있다"
    when: "사용자가 '회의록 작성' 카드를 클릭한다"
    then: "제목, 설명, 우선순위, 태그, 마감일 편집 UI가 모두 표시된다"
    examples:
      - input: { cardTitle: "회의록 작성" }
        expect:
          titleFieldVisible: true
          descriptionFieldVisible: true
          priorityFieldVisible: true
          tagFieldVisible: true
          dueDateFieldVisible: true

  - id: "KANBAN-017"
    name: "카드 태그 제거"
    given: "'회의록 작성' 카드에 '버그' 태그가 있다"
    when: "사용자가 카드 편집 화면에서 '버그' 태그를 제거한다"
    then: "카드에서 '버그' 태그가 사라진다"
    examples:
      - input: { cardTitle: "회의록 작성", removeTag: "버그" }
        expect: { tagText: "버그", tagVisible: false }

  - id: "KANBAN-018"
    name: "태그 필터 해제"
    given: "태그 '버그' 필터가 활성화되어 있고 전체 카드가 3개다"
    when: "사용자가 태그 필터를 해제한다"
    then: "모든 카드가 다시 표시된다"
    examples:
      - input: { tagFilter: null }
        expect: { visibleCardCount: 3 }

  - id: "KANBAN-019"
    name: "카드 추가 후 새로고침 복원"
    given: "사용자가 '회의록 작성' 카드를 To Do 칼럼에 추가했다"
    when: "페이지를 새로고침한다"
    then: "To Do 칼럼에 '회의록 작성' 카드가 표시된다"
    examples:
      - input: { cardTitle: "회의록 작성", column: "To Do" }
        expect: { column: "To Do", cardText: "회의록 작성" }
